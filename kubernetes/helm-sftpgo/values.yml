# -- Additional ports to expose in the deployment and service.
additionalPorts: {}
  # custom-sftp:
  #   port: 2222           # Service port
  #   containerPort: 22    # Pod port

ui:
  ingress:
    # -- Enable [ingress](https://kubernetes.io/docs/concepts/services-networking/ingress/).
    enabled: true

    # -- Ingress [class name](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class).
    className: "nginx"

    # -- Annotations to be added to the ingress.
    annotations:
      nginx.ingress.kubernetes.io/allow-credentials: "true"
      nginx.ingress.kubernetes.io/cors-allow-headers: X-Forwarded-Host, X-Forwarded-For, Origin, Accept, Authorization, Content-Type, Host
      nginx.ingress.kubernetes.io/cors-allow-methods: GET, PUT, POST, DELETE, UPDATE, OPTIONS
      nginx.ingress.kubernetes.io/cors-allow-origin: https://sftp-ui.hyrsh.io, https://sftp-ui.m0rpheus.ch
      nginx.ingress.kubernetes.io/enable-cors: "true"
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"

    # -- Ingress host configuration.
    # @default -- See [values.yaml](values.yaml).
    hosts:
      - host: sftp-ui.hyrsh.io
        # Change httpd.web_root in the sftpgo configuration if you change the path
        paths:
          - path: /
            pathType: ImplementationSpecific

    # -- Ingress TLS configuration.
    # @default -- See [values.yaml](values.yaml).
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

api:
  ingress:
    # -- Enable [ingress](https://kubernetes.io/docs/concepts/services-networking/ingress/).
    enabled: true

    # -- Ingress [class name](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class).
    className: "nginx"

    # -- Annotations to be added to the ingress.
    annotations: {}
      # nginx.ingress.kubernetes.io/rewrite-target: /$1
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"

    # -- Ingress host configuration.
    # @default -- See [values.yaml](values.yaml).
    hosts:
      - host: sftp-api.hyrsh.io
        # SFTPGo does not change the path for the API endpoint if httpd.web_root is set. So, we need to rewrite to the root path.
        paths:
          - path: /api/(.*)
            pathType: ImplementationSpecific

    # -- Ingress TLS configuration.
    # @default -- See [values.yaml](values.yaml).
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

# -- Container resource [requests and limits](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#resources) for details.
# @default -- No requests or limits.
resources: 
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 2
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# -- Autoscaling configuration (see [values.yaml](values.yaml) for details).
# @default -- Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  # - type: Resource
  #   resource:
  #     name: cpu
  #     target:
  #       type: Utilization
  #       averageUtilization: 80
  # - type: Pods
  #   pods:
  #     metric:
  #       name: packets-per-second
  #     target:
  #       type: AverageValue
  #       averageValue: 1k
  # - type: Object
  #   object:
  #     metric:
  #       name: requests-per-second
  #    describedObject:
  #       apiVersion: networking.k8s.io/v1
  #       kind: Ingress
  #       name: main-route
  #     target:
  #       type: Value
  #       value: 10k

# -- [Pod Disruption Budget](https://kubernetes.io/docs/concepts/workloads/pods/disruptions/) configuration.
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/policy-resources/pod-disruption-budget-v1/) for details.
# Note: minAvailable and maxUnavailable cannot be used simultaneously.
pdb:
  # -- Enable Pod Disruption Budget creation.
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 1

# -- [Node selector](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector) configuration.
nodeSelector:
  type: worker

# -- [Tolerations](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/) for node taints.
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#scheduling) for details.
tolerations: []

# -- [Affinity](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity) configuration.
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#scheduling) for details.
affinity: {}

# -- Run pods in the host network of nodes.
# Warning: The use of host network is [discouraged](https://kubernetes.io/docs/concepts/configuration/overview/#services). Make sure to use it only when absolutely necessary.
hostNetwork: false

# -- [Network Policies](https://kubernetes.io/docs/concepts/services-networking/network-policies/) configuration.
networkPolicy:
  # -- Enable creation of NetworkPolicy resources.
  enabled: false
  # -- Specifies the policy types. Defaults to Ingress and Egress if not specified.
  policyTypes: []
  # -- Ingress rules.
  ingress: []
  # -- Egress rules.
  egress: []

# -- [Topology Spread Constraints](https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/) configuration.
# Accepts a list of constraints. The legacy object format is also supported for backward compatibility.
topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule
  #   matchLabelKeys:
  #     - pod-template-hash

persistence:
  # -- Enable persistent storage for the /var/lib/sftpgo directory, saving state of the default sqlite db.
  enabled: true

  # -- Annotations to be added to the PVC.
  annotations: {}

  # -- Create the pvc desired specificiation.
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 5Gi
    storageClassName: "csi-cephfs-sc"

# -- Prometheus PodMonitor configuration.
# See the [Prometheus Operator documentation](https://prometheus-operator.dev/docs/operator/api/#monitoring.coreos.com/v1.PodMonitor) for details.
podMonitor:
  # -- Enable PodMonitor resource for Prometheus Operator to scrape pod metrics.
  enabled: false

  # -- Additional labels for the PodMonitor resource.
  # Useful if your Prometheus Operator requires specific labels to discover the monitor.
  labels: {}
    # release: kube-prometheus-stack

  # -- Additional annotations for the PodMonitor resource.
  annotations: {}

  # -- Scrape interval (e.g., 10s, 1m).
  interval: 1m

  # -- Scrape timeout (e.g., 10s).
  scrapeTimeout: 10s
