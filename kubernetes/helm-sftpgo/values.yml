serviceAccount:
  # -- Enable service account creation.
  create: true

  # -- Automount API credentials for the Service Account.
  automountServiceAccountToken: true

  # -- Annotations to be added to the service account.
  annotations: {}

  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# -- Annotations to be added to deployment.
deploymentAnnotations: {}

# -- Labels to be added to deployment.
deploymentLabels: {}

# -- Annotations to be added to pods.
podAnnotations: {}

# -- Labels to be added to pods.
podLabels: {}

# -- Pod priority class name.
podPriorityClassName:

# -- Duration in seconds the pod needs to terminate gracefully.
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#lifecycle) for details.
# Should be set in conjunction with SFTPGO_GRACE_TIME environment variable.
# Expected value: number of seconds (int64).
podTerminationGracePeriodSeconds: null

# -- Pod [security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod).
# See the [API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#security-context) for details.
